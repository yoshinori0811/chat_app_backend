version: '3.8'

services:
  app:
    build: .
    container_name: chat_app
    ports:
      - "8080:8080"
      - "50051:50051"  # gRPC 通信用
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: chat_app
      TZ: Asia/Tokyo
    # command: sh -c "/app/migrate && /app/main"
    command: sh -c "/app/main"
    networks:
      - app-network

  db:
    image: mysql:8.4.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: chat_app
      TZ: Asia/Tokyo
    ports:
      - "3307:3306"
    # expose:
    #   - 3307
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - app-network

volumes:
  mysql-data:

networks:
  app-network: